name: ci

# This pipeline IS the definition of done. On the prototype as shipped it is RED.
# Your job is to make it GREEN by making the pipeline correct and resilient.
#
# Two jobs:
#   lint            - fast feedback: every service / script compiles
#   integration     - boots the whole stack and runs the acceptance check as a gate
#
# Additional jobs (bonus):
#   security        - Trivy CVE scan on the built worker image (fails on CRITICAL)
#   publish         - builds and pushes worker image to GHCR on main, tagged with git SHA
#
# Gate order: lint ──┐
#                    ├──> security ──> publish (main only)
#             integration ──┘

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all Python
        run: python -m compileall -q services scripts
      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up --build -d

      - name: Wait for the producer to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health > /dev/null; then
              echo "producer ready"; exit 0
            fi
            sleep 2
          done
          echo "producer never became ready"; exit 1

      - name: Give the worker time to subscribe
        run: sleep 10

      - name: Generate load (includes duplicate orders)
        run: python scripts/load.py

      - name: Acceptance check (must be correct under duplicates + flaky payments)
        run: python scripts/check.py

      - name: Resilience check (restart worker mid-flight, must still converge)
        run: |
          docker compose restart worker
          python scripts/check.py

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  security:
    runs-on: ubuntu-latest
    needs: [lint, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Build worker image for scanning
        run: docker build -t worker:ci services/worker

      - name: Scan worker image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: worker:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

  publish:
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (SHA tag + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/worker
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push worker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: services/worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
